version: '3.8'

services:
  postiz-db:
    image: postgres:15-alpine
    container_name: postiz-db
    environment:
      POSTGRES_DB: postiz
      POSTGRES_USER: postiz_user
      POSTGRES_PASSWORD: postiz_password_safe2026!
    ports:
      - "5432:5432"
    volumes:
      - postiz-db-data:/var/lib/postgresql/data
    networks:
      - postiz-net

  postiz-redis:
    image: redis:7-alpine
    container_name: postiz-redis
    ports:
      - "6380:6379"
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-net

  postiz-app:
    image: gitroom/postiz-app:latest
    container_name: postiz-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postiz_user:postiz_password_safe2026!@postiz-db:5432/postiz
      - REDIS_URL=redis://postiz-redis:6379
      - JWT_SECRET=PostizSecretJWTKeyForSelfHosting2026!
      - NEXTAUTH_SECRET=PostizSecretNextAuthKeyForSelfHosting2026!
      - MAIN_URL=http://localhost:3000
    depends_on:
      - postiz-db
      - postiz-redis
    networks:
      - postiz-net

volumes:
  postiz-db-data:
  postiz-redis-data:

networks:
  postiz-net:
    driver: bridge
