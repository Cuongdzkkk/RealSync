name: RealSync CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore backend/RealSync.slnx

    - name: Build
      run: dotnet build backend/RealSync.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test backend/RealSync.slnx --no-build --verbosity normal --configuration Release

  build-frontend:
    runs-on: ubuntu-latest
    # Assuming frontend will be in the 'frontend' directory
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Build placeholder (Wait for frontend setup)
      run: echo "Frontend build will be implemented in Phase 3"
